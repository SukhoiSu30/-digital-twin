# ================================================================
# CHART.YAML — Helm Chart Metadata
# ================================================================
# This is the "package.json" of your Helm chart.
# It tells Helm: what is this chart, what version is it,
# and what version of the app does it deploy?
#
# apiVersion: v2 = Helm 3 format
# type: application = deploys an app (vs "library" = shared templates)
# ================================================================

apiVersion: v2
name: digital-twin
description: A Helm chart for the Digital Twin AI Meeting Agent
type: application

# Chart version — bump this when you change the chart itself
# (add a template, change defaults, etc.)
version: 0.1.0

# App version — the version of YOUR application
# This appears in `helm list` so you know what's deployed
appVersion: "1.0.0"

maintainers:
  - name: Pratik Bhosale
    email: bhosale.pratik76@gmail.com
