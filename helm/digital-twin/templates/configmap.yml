apiVersion: v1
kind: ConfigMap
metadata:
  name: api-config
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "digital-twin.labels" . | nindent 4 }}
    component: api
data:
  NODE_ENV: {{ .Values.config.nodeEnv | quote }}
  PORT: {{ .Values.config.port | quote }}
  FRONTEND_URL: {{ .Values.config.frontendUrl | quote }}
