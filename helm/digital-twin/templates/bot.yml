apiVersion: apps/v1
kind: Deployment
metadata:
  name: bot
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "digital-twin.labels" . | nindent 4 }}
    component: bot
spec:
  replicas: {{ .Values.bot.replicas }}
  selector:
    matchLabels:
      {{- include "digital-twin.selectorLabels" . | nindent 6 }}
      component: bot
  template:
    metadata:
      labels:
        {{- include "digital-twin.selectorLabels" . | nindent 8 }}
        component: bot
    spec:
      initContainers:
        - name: wait-for-dependencies
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for postgres-service..."
              until nc -z postgres-service {{ .Values.postgres.port }}; do sleep 2; done
              echo "Postgres ready!"
              echo "Waiting for redis-service..."
              until nc -z redis-service {{ .Values.redis.port }}; do sleep 2; done
              echo "Redis ready!"
      containers:
        - name: bot
          image: "{{ .Values.bot.image.repository }}:{{ .Values.bot.image.tag }}"
          imagePullPolicy: {{ .Values.bot.image.pullPolicy }}
          envFrom:
            - configMapRef:
                name: api-config
            - secretRef:
                name: api-secrets
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - "pgrep -x node || exit 1"
            initialDelaySeconds: 15
            periodSeconds: 15
          resources:
            requests:
              cpu: {{ .Values.bot.resources.requests.cpu }}
              memory: {{ .Values.bot.resources.requests.memory }}
            limits:
              cpu: {{ .Values.bot.resources.limits.cpu }}
              memory: {{ .Values.bot.resources.limits.memory }}
