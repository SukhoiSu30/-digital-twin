services:
  - type: web
    name: digital-twin-api
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install && npx prisma generate --schema=packages/database/prisma/schema.prisma && npm run build -w apps/server
    startCommand: node apps/server/dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        fromDatabase:
          name: digital-twin-db
          property: connectionString
      - key: FRONTEND_URL
        sync: false
      - key: MICROSOFT_CLIENT_ID
        sync: false
      - key: MICROSOFT_CLIENT_SECRET
        sync: false
      - key: MICROSOFT_TENANT_ID
        sync: false
      - key: ZOOM_CLIENT_ID
        sync: false
      - key: ZOOM_CLIENT_SECRET
        sync: false
      - key: DEEPGRAM_API_KEY
        sync: false
      - key: CLAUDE_API_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: SESSION_SECRET
        generateValue: true

  - type: web
    name: digital-twin-dashboard
    runtime: static
    buildCommand: npm install && npm run build -w apps/web
    staticPublishPath: apps/web/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: digital-twin-api
          type: web
          property: host

databases:
  - name: digital-twin-db
    plan: free
    databaseName: digital_twin
