# ================================================================
# INGRESS — External Traffic Routing
# ================================================================
# An Ingress is like Nginx reverse proxy but for Kubernetes!
# It routes external traffic to internal Services based on URL path.
#
# Docker Compose:  nginx.conf → proxy_pass to backend
# Kubernetes:      Ingress → routes to Services
#
# How traffic flows:
#   User → Ingress Controller → Ingress Rules → Service → Pod
#
# Path-based routing (same concept as our nginx.conf!):
#   /api/*  → api-service:3000
#   /*      → frontend-service:80
#
# Prerequisites:
#   minikube addons enable ingress
#   (This installs the Nginx Ingress Controller)
# ================================================================

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: digital-twin-ingress
  namespace: digital-twin
  labels:
    app: digital-twin
    component: ingress
  annotations:
    # ── Annotations ──
    # Extra configuration hints for the Ingress Controller.
    # Different controllers (Nginx, Traefik, AWS ALB) use different annotations.

    # Tell Kubernetes which ingress controller to use
    kubernetes.io/ingress.class: nginx

    # Rewrite /api/health → /api/health (keep the path as-is)
    # Without this, /api/* might get rewritten incorrectly
    nginx.ingress.kubernetes.io/use-regex: "true"

    # Enable CORS (Cross-Origin Resource Sharing)
    # Needed because frontend (port 80) calls API (port 3000)
    nginx.ingress.kubernetes.io/enable-cors: "true"
spec:
  rules:
    # ── Host-based routing ──
    # In production: host: digital-twin.yourdomain.com
    # For local dev: we'll use minikube's IP directly
    - http:
        paths:
          # ── API routes ──
          # /api/* → api-service:3000
          # pathType: Prefix means /api matches /api, /api/health, /api/meetings, etc.
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api-service
                port:
                  number: 3000

          # ── Frontend routes (catch-all) ──
          # Everything else → frontend-service:80
          # This serves the React app for all non-API routes
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80
