# ================================================================
# API SERVER — Express.js Backend (Deployment + Service)
# ================================================================
# The API is stateless — it doesn't store data locally.
# All state lives in Postgres and Redis, so a Deployment is perfect.
#
# Key Kubernetes concepts used here:
#   - Deployment: manages ReplicaSets, handles rolling updates
#   - envFrom: bulk-load env vars from ConfigMap/Secret
#   - initContainers: run setup tasks BEFORE the main container
#   - Service: stable internal DNS name for the API
# ================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: digital-twin
  labels:
    app: digital-twin
    component: api
spec:
  replicas: 2                          # 2 replicas for high availability
  selector:
    matchLabels:
      app: digital-twin
      component: api
  # ── Rolling Update Strategy ──
  # Controls HOW pods are replaced during updates.
  # maxSurge: 1     → create 1 extra pod above desired count
  # maxUnavailable: 0 → never kill old pod until new one is ready
  # Result: zero-downtime deployments!
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: digital-twin
        component: api
    spec:
      # ── Init Container ──
      # Runs BEFORE the main container starts.
      # Use case: wait for Postgres to be ready before starting the API.
      # If the init container fails, Kubernetes retries it (main container won't start).
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for postgres-service to be reachable..."
              until nc -z postgres-service 5432; do
                echo "Postgres not ready, retrying in 2s..."
                sleep 2
              done
              echo "Postgres is ready!"

      containers:
        - name: api
          # For local dev with Minikube, we use a local image.
          # In production, this would be:
          #   image: ghcr.io/your-username/digital-twin-api:latest
          image: digital-twin-api:latest
          # ── imagePullPolicy ──
          # Never  = use local image, don't pull from registry
          # Always = always pull latest from registry
          # IfNotPresent = pull only if not cached locally
          imagePullPolicy: Never        # Use Minikube's local Docker images
          ports:
            - containerPort: 3000
          # ── envFrom ──
          # Bulk-loads ALL keys from a ConfigMap or Secret as env vars.
          # Much cleaner than listing each env var individually!
          # ConfigMap keys → env vars (NODE_ENV, PORT, FRONTEND_URL)
          # Secret keys → env vars (DATABASE_URL, REDIS_URL, JWT_SECRET)
          envFrom:
            - configMapRef:
                name: api-config       # All keys from ConfigMap
            - secretRef:
                name: api-secrets      # All keys from Secret
          # ── Readiness Probe ──
          # "Is this pod ready to receive traffic?"
          # Kubernetes won't send traffic to a pod until readiness passes.
          # Uses our /api/health endpoint — same as Docker HEALTHCHECK!
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10    # Wait 10s before first check
            periodSeconds: 5           # Check every 5 seconds
          # ── Liveness Probe ──
          # "Is this pod still alive?"
          # If liveness fails, Kubernetes RESTARTS the pod.
          # Catches: deadlocks, memory leaks, hung processes
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15    # Give app time to start
            periodSeconds: 10          # Check every 10 seconds
            failureThreshold: 3        # Restart after 3 consecutive failures
          # ── Resource Management ──
          # requests = guaranteed minimum (used for scheduling)
          # limits = hard maximum (pod killed if exceeded)
          resources:
            requests:
              cpu: 100m                # 0.1 CPU cores guaranteed
              memory: 128Mi            # 128 MB RAM guaranteed
            limits:
              cpu: 500m                # Max 0.5 CPU cores
              memory: 512Mi            # Max 512 MB RAM (OOMKilled if exceeded)

---
# ── Service ──
# Gives the API a stable DNS name: "api-service"
# Other pods (frontend, bot) connect to "api-service:3000"
# The Service load-balances across all API replicas automatically!
apiVersion: v1
kind: Service
metadata:
  name: api-service
  namespace: digital-twin
  labels:
    app: digital-twin
    component: api
spec:
  type: ClusterIP                      # Internal only (Ingress handles external)
  ports:
    - port: 3000                       # Service port
      targetPort: 3000                 # Container port
  selector:                            # Route to pods with these labels
    app: digital-twin
    component: api
