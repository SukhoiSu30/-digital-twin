# ================================================================
# FRONTEND — React + Nginx (Deployment + Service)
# ================================================================
# The frontend is a static React app served by Nginx.
# It's completely stateless — perfect for a Deployment.
#
# In Docker Compose, Nginx proxied API calls (/api → backend).
# In Kubernetes, the Ingress controller handles routing instead!
# The frontend just serves static files.
# ================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: digital-twin
  labels:
    app: digital-twin
    component: frontend
spec:
  replicas: 2                          # 2 replicas for availability
  selector:
    matchLabels:
      app: digital-twin
      component: frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: digital-twin
        component: frontend
    spec:
      containers:
        - name: frontend
          image: digital-twin-web:latest
          imagePullPolicy: Never       # Use Minikube's local images
          ports:
            - containerPort: 80
          # ── HTTP Readiness Probe ──
          # Nginx serves static files — if it responds 200, it's ready.
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
          # ── Volume Mount ──
          # Override the default nginx config with our K8s version
          # This replaces the file INSIDE the container without
          # rebuilding the Docker image! Super powerful pattern.
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf    # Mount single file, not whole dir
          resources:
            requests:
              cpu: 50m                 # Nginx is lightweight
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
      # ── Volumes ──
      # Load the ConfigMap as a volume that can be mounted into containers
      volumes:
        - name: nginx-config
          configMap:
            name: frontend-nginx-config

---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: digital-twin
  labels:
    app: digital-twin
    component: frontend
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 80
  selector:
    app: digital-twin
    component: frontend
