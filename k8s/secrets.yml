# ================================================================
# SECRETS — Sensitive data (passwords, API keys)
# ================================================================
# Secrets are like ConfigMaps but for sensitive data.
# Values are base64-encoded (NOT encrypted by default!).
# In production, use:
#   - AWS Secrets Manager + External Secrets Operator
#   - HashiCorp Vault
#   - Sealed Secrets (encrypted in Git)
#
# NEVER commit real secrets to Git!
# This file uses placeholder values for learning.
#
# To base64 encode: echo -n "myvalue" | base64
# To decode: echo "bXl2YWx1ZQ==" | base64 -d
# ================================================================

