server {
    listen 80;
    server_name localhost;

    # Where the static files live
    root /usr/share/nginx/html;
    index index.html;

    # SPA (Single Page Application) routing
    # React uses client-side routing (react-router-dom)
    # When someone visits /meetings/123, Nginx doesn't have that file
    # This tells Nginx: "if the file doesn't exist, serve index.html
    # and let React handle the routing"
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to the backend container
    # When frontend calls /api/meetings, Nginx forwards it to the API service
    # "api" is the service name from docker-compose (Docker DNS)
    location /api/ {
        proxy_pass http://api:3000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Cache static assets aggressively (JS, CSS, images)
    # These files have hashed names (main.a1b2c3.js) so caching is safe
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Gzip compression — reduces file sizes by 70-80%
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 1000;
}
